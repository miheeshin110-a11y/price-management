<!-- 사유코드 모달 -->
<div id="reasonModal" class="hidden fixed inset-0 bg-black/50 z-40 flex items-center justify-center p-4 modal-overlay">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md modal-box">
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
      <h3 id="modalTitle" class="text-base font-bold text-gray-800">사유코드 추가</h3>
      <button onclick="closeModal()" class="p-1.5 rounded-lg hover:bg-gray-100 text-gray-500">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="px-6 py-5 space-y-4">
      <div>
        <label class="text-xs font-semibold text-gray-600 block mb-1.5">사유코드 <span class="text-red-500">*</span></label>
        <input id="f_reason_code" type="text" placeholder="예: RM-03" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" />
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-600 block mb-1.5">카테고리 <span class="text-red-500">*</span></label>
        <input id="f_reason_category" type="text" placeholder="예: 원자재" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" />
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-600 block mb-1.5">사유명 <span class="text-red-500">*</span></label>
        <input id="f_reason_name" type="text" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" />
      </div>
    </div>
    <div class="px-6 pb-5 flex gap-3 justify-end">
      <button onclick="closeModal()" class="px-4 py-2 text-sm rounded-lg border border-gray-200 hover:bg-gray-50">취소</button>
      <button onclick="saveReason()" class="px-5 py-2 text-sm bg-navy-800 text-white rounded-lg hover:bg-navy-700 font-medium">저장</button>
    </div>
  </div>
</div>

<div id="globalSpinner" class="hidden fixed inset-0 bg-black/30 z-50 flex items-center justify-center"><div class="spinner-ring"></div></div>
<div id="toastContainer" class="fixed top-5 right-5 space-y-2 z-50"></div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script>
let editMode = false;

async function loadReasons() {
  const res = await apiGet('getReasonCodes');
  if (!res.success) { showToast(res.message, 'error'); return; }
  const data = res.data;
  const tbody = document.getElementById('reasonTable');
  if (!data.length) { tbody.innerHTML = emptyRow(5); return; }

  // 카테고리별 그룹
  const groups = {};
  data.forEach(r => {
    if (!groups[r.reason_category]) groups[r.reason_category] = [];
    groups[r.reason_category].push(r);
  });

  let html = '';
  Object.entries(groups).forEach(([cat, items]) => {
    html += `<tr class="bg-gray-50"><td colspan="5" class="px-4 py-2 text-xs font-bold text-gray-500 uppercase tracking-wide">${cat}</td></tr>`;
    items.forEach(r => {
      const isActive = String(r.is_active) === '1' || r.is_active === true || r.is_active === 1;
      html += `
      <tr class="border-t border-gray-50 ${isActive ? '' : 'opacity-50'}">
        <td class="px-4 py-3 font-mono text-sm font-semibold text-navy-800">${r.reason_code}</td>
        <td class="px-4 py-3 text-gray-500">${r.reason_category}</td>
        <td class="px-4 py-3 font-medium">${r.reason_name}</td>
        <td class="px-4 py-3 text-center">
          ${isActive
            ? '<span class="text-xs bg-emerald-50 text-emerald-700 border border-emerald-200 px-2.5 py-0.5 rounded-full">활성</span>'
            : '<span class="text-xs bg-gray-100 text-gray-500 border border-gray-200 px-2.5 py-0.5 rounded-full">비활성</span>'}
        </td>
        <td class="px-4 py-3 text-center">
          <div class="flex items-center justify-center gap-2">
            <button onclick="openEditModal('${r.reason_code}')" class="text-xs px-2.5 py-1 rounded-md border border-gray-200 hover:bg-gray-50 text-gray-600">수정</button>
            ${isActive
              ? `<button onclick="toggleActive('${r.reason_code}', false)" class="text-xs px-2.5 py-1 rounded-md border border-amber-100 hover:bg-amber-50 text-amber-600">비활성화</button>`
              : `<button onclick="toggleActive('${r.reason_code}', true)"  class="text-xs px-2.5 py-1 rounded-md border border-emerald-100 hover:bg-emerald-50 text-emerald-600">활성화</button>`}
          </div>
        </td>
      </tr>`;
    });
  });
  tbody.innerHTML = html;
}

let allReasons = [];
async function openEditModal(code) {
  if (!allReasons.length) {
    const res = await apiGet('getReasonCodes');
    if (res.success) allReasons = res.data;
  }
  const r = allReasons.find(x => x.reason_code === code);
  if (!r) return;
  editMode = true;
  document.getElementById('modalTitle').textContent = '사유코드 수정';
  document.getElementById('f_reason_code').value = r.reason_code;
  document.getElementById('f_reason_code').disabled = true;
  document.getElementById('f_reason_category').value = r.reason_category;
  document.getElementById('f_reason_name').value = r.reason_name;
  document.getElementById('reasonModal').classList.remove('hidden');
}

function openAddModal() {
  editMode = false;
  document.getElementById('modalTitle').textContent = '사유코드 추가';
  document.getElementById('f_reason_code').disabled = false;
  ['reason_code','reason_category','reason_name'].forEach(k => document.getElementById('f_'+k).value = '');
  document.getElementById('reasonModal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('reasonModal').classList.add('hidden');
  allReasons = [];
}

async function saveReason() {
  const data = {
    reason_code: document.getElementById('f_reason_code').value.trim(),
    reason_category: document.getElementById('f_reason_category').value.trim(),
    reason_name: document.getElementById('f_reason_name').value.trim()
  };
  if (!data.reason_code)     { showToast('사유코드를 입력하세요.', 'warning'); return; }
  if (!data.reason_category) { showToast('카테고리를 입력하세요.', 'warning'); return; }
  if (!data.reason_name)     { showToast('사유명을 입력하세요.', 'warning'); return; }

  const action = editMode ? 'updateReasonCode' : 'addReasonCode';
  const res = await apiPost(action, data);
  if (res.success) {
    showToast(res.message, 'success');
    closeModal();
    loadReasons();
  } else {
    showToast(res.message, 'error');
  }
}

async function toggleActive(code, activate) {
  const label = activate ? '활성화' : '비활성화';
  if (!confirm(`[${code}] 코드를 ${label}하시겠습니까?`)) return;
  const res = await apiPost('updateReasonCode', { reason_code: code, is_active: activate ? 1 : 0 });
  if (res.success) {
    showToast(`${label} 처리되었습니다.`, 'success');
    loadReasons();
  } else {
    showToast(res.message, 'error');
  }
}

loadReasons();
</script>
</body>
