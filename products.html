<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제품 관리 - 발주단가 관리 시스템</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
  <script>tailwind.config={theme:{extend:{colors:{navy:{900:'#0f2340',800:'#1e3a5f',700:'#2a4f7c',600:'#3b6494'}}}}}</script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex">

<div id="sidebarOverlay" class="hidden fixed inset-0 bg-black/40 z-20 mobile-only"></div>
<aside id="sidebar" class="fixed top-0 left-0 h-full w-60 bg-navy-800 text-white z-30 flex flex-col -translate-x-full md:translate-x-none">
  <div class="px-6 py-5 border-b border-white/10">
    <div class="text-xs text-white/50 font-medium tracking-widest uppercase mb-1">DAYSON</div>
    <div class="text-base font-bold leading-tight">발주단가<br>관리 시스템</div>
  </div>
  <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
    <a href="index.html"        data-nav="index.html"       class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-white/70 hover:bg-white/10 transition-colors"><svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>대시보드</a>
    <a href="products.html"     data-nav="products.html"    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-white/70 hover:bg-white/10 transition-colors"><svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 3H8a2 2 0 00-2 2v2h12V5a2 2 0 00-2-2z"/></svg>제품 관리</a>
    <a href="price-history-tab.html" data-nav="price-history-tab.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-white/70 hover:bg-white/10 transition-colors"><svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M7 12l5-5 5 5M7 17l5-5 5 5"/></svg>단가 히스토리</a>
    <a href="price-change.html" data-nav="price-change.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-white/70 hover:bg-white/10 transition-colors"><svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12l7-7 7 7"/></svg>단가 변경 등록</a>
    <a href="history.html"      data-nav="history.html"     class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-white/70 hover:bg-white/10 transition-colors"><svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>전체 이력 조회</a>
    <a href="settings.html"     data-nav="settings.html"    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-white/70 hover:bg-white/10 transition-colors"><svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>사유코드 관리</a>
  </nav>
  <div class="px-6 py-4 border-t border-white/10 text-xs text-white/30">v1.0.0</div>
</aside>

<div class="flex-1 flex flex-col md:ml-60 min-h-screen">
  <header class="sticky top-0 z-10 bg-white border-b border-gray-200 flex items-center justify-between px-5 py-3.5 shadow-sm">
    <div class="flex items-center gap-3">
      <button id="sidebarToggle" class="md:hidden p-1.5 rounded-lg hover:bg-gray-100 mobile-only">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <h1 class="text-base font-semibold text-gray-700">제품 관리</h1>
    </div>
    <button onclick="openAddModal()" class="flex items-center gap-2 bg-navy-800 text-white text-sm px-4 py-2 rounded-lg hover:bg-navy-700 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      제품 등록
    </button>
  </header>

  <main class="flex-1 p-5 md:p-6">
    <!-- 검색/필터 -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-5 flex flex-wrap gap-3">
      <input id="searchInput" type="text" placeholder="제품코드 / 제품명 검색" class="border border-gray-200 rounded-lg px-3 py-2 text-sm flex-1 min-w-48" />
      <select id="categoryFilter" class="border border-gray-200 rounded-lg px-3 py-2 text-sm min-w-36">
        <option value="">전체 카테고리</option>
      </select>
      <button onclick="loadProducts()" class="bg-navy-800 text-white text-sm px-4 py-2 rounded-lg hover:bg-navy-700 transition-colors">검색</button>
    </div>

    <!-- 테이블 -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm data-table">
          <thead>
            <tr class="bg-gray-50 text-xs text-gray-500 uppercase tracking-wide">
              <th class="px-4 py-3 text-left font-medium">제품코드</th>
              <th class="px-4 py-3 text-left font-medium">제품명</th>
              <th class="px-4 py-3 text-left font-medium desktop-only">카테고리</th>
              <th class="px-4 py-3 text-left font-medium desktop-only">단위</th>
              <th class="px-4 py-3 text-left font-medium desktop-only">거래처</th>
              <th class="px-4 py-3 text-right font-medium">현재 단가</th>
              <th class="px-4 py-3 text-center font-medium desktop-only">최종 변경일</th>
              <th class="px-4 py-3 text-center font-medium">액션</th>
            </tr>
          </thead>
          <tbody id="productTable">
            <tr><td colspan="8" class="px-4 py-10 text-center text-gray-400 text-sm">로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- 제품 등록/수정 모달 -->
<div id="productModal" class="hidden fixed inset-0 bg-black/50 z-40 flex items-center justify-center p-4 modal-overlay">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg modal-box">
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
      <h3 id="modalTitle" class="text-base font-bold text-gray-800">제품 등록</h3>
      <button onclick="closeModal()" class="p-1.5 rounded-lg hover:bg-gray-100 text-gray-500">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="px-6 py-5 space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-xs font-semibold text-gray-600 block mb-1.5">제품코드 <span class="text-red-500">*</span></label>
          <input id="f_product_id" type="text" placeholder="예: PROD-001" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" />
        </div>
        <div>
          <label class="text-xs font-semibold text-gray-600 block mb-1.5">제품명 <span class="text-red-500">*</span></label>
          <input id="f_product_name" type="text" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" />
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-xs font-semibold text-gray-600 block mb-1.5">카테고리</label>
          <input id="f_category" type="text" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" />
        </div>
        <div>
          <label class="text-xs font-semibold text-gray-600 block mb-1.5">단위</label>
          <input id="f_unit" type="text" placeholder="예: 개, kg, 박스" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" />
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-xs font-semibold text-gray-600 block mb-1.5">거래처명</label>
          <input id="f_supplier_name" type="text" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" />
        </div>
        <div>
          <label class="text-xs font-semibold text-gray-600 block mb-1.5">현재 단가 <span class="text-red-500">*</span></label>
          <input id="f_current_price" type="number" min="0" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" />
        </div>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-600 block mb-1.5">메모</label>
        <textarea id="f_memo" rows="2" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm resize-none"></textarea>
      </div>
    </div>
    <div class="px-6 pb-5 flex gap-3 justify-end">
      <button onclick="closeModal()" class="px-4 py-2 text-sm rounded-lg border border-gray-200 hover:bg-gray-50">취소</button>
      <button onclick="saveProduct()" class="px-5 py-2 text-sm bg-navy-800 text-white rounded-lg hover:bg-navy-700 font-medium">저장</button>
    </div>
  </div>
</div>

<div id="globalSpinner" class="hidden fixed inset-0 bg-black/30 z-50 flex items-center justify-center"><div class="spinner-ring"></div></div>
<div id="toastContainer" class="fixed top-5 right-5 space-y-2 z-50"></div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script>
let allProducts = [];
let editMode = false;

async function loadProducts() {
  const search = document.getElementById('searchInput').value.trim();
  const category = document.getElementById('categoryFilter').value;
  const res = await apiGet('getProducts', { search, category });
  if (!res.success) { showToast(res.message, 'error'); return; }
  allProducts = res.data;

  // 카테고리 목록 빌드
  const cats = [...new Set(allProducts.map(p => p.category).filter(Boolean))];
  const catSel = document.getElementById('categoryFilter');
  const cur = catSel.value;
  catSel.innerHTML = '<option value="">전체 카테고리</option>' + cats.map(c => `<option value="${c}" ${c===cur?'selected':''}>${c}</option>`).join('');

  renderTable(res.data);
}

function renderTable(data) {
  const tbody = document.getElementById('productTable');
  if (!data.length) { tbody.innerHTML = emptyRow(8); return; }
  tbody.innerHTML = data.map(p => `
    <tr onclick="location.href='history-detail.html?id=${encodeURIComponent(p.product_id)}'" class="border-t border-gray-50">
      <td class="px-4 py-3 font-mono text-xs text-gray-600">${p.product_id}</td>
      <td class="px-4 py-3 font-medium">${p.product_name}</td>
      <td class="px-4 py-3 text-gray-500 desktop-only">${p.category || '-'}</td>
      <td class="px-4 py-3 text-gray-500 desktop-only">${p.unit || '-'}</td>
      <td class="px-4 py-3 text-gray-500 desktop-only">${p.supplier_name || '-'}</td>
      <td class="px-4 py-3 text-right font-semibold">${formatPrice(p.current_price)}</td>
      <td class="px-4 py-3 text-center text-gray-400 text-xs desktop-only">${p.updated_at || '-'}</td>
      <td class="px-4 py-3 text-center" onclick="event.stopPropagation()">
        <div class="flex items-center justify-center gap-2">
          <button onclick="openEditModal('${p.product_id}')" class="text-xs px-2.5 py-1 rounded-md border border-gray-200 hover:bg-gray-50 text-gray-600">수정</button>
          <button onclick="deleteProduct('${p.product_id}', '${p.product_name}')" class="text-xs px-2.5 py-1 rounded-md border border-red-100 hover:bg-red-50 text-red-500">삭제</button>
        </div>
      </td>
    </tr>`).join('');
}

function openAddModal() {
  editMode = false;
  document.getElementById('modalTitle').textContent = '제품 등록';
  document.getElementById('f_product_id').disabled = false;
  ['product_id','product_name','category','unit','supplier_name','current_price','memo'].forEach(k => {
    document.getElementById('f_'+k).value = '';
  });
  document.getElementById('productModal').classList.remove('hidden');
}

function openEditModal(id) {
  const p = allProducts.find(x => x.product_id === id);
  if (!p) return;
  editMode = true;
  document.getElementById('modalTitle').textContent = '제품 수정';
  document.getElementById('f_product_id').value = p.product_id;
  document.getElementById('f_product_id').disabled = true;
  document.getElementById('f_product_name').value = p.product_name;
  document.getElementById('f_category').value = p.category || '';
  document.getElementById('f_unit').value = p.unit || '';
  document.getElementById('f_supplier_name').value = p.supplier_name || '';
  document.getElementById('f_current_price').value = p.current_price;
  document.getElementById('f_memo').value = p.memo || '';
  document.getElementById('productModal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('productModal').classList.add('hidden');
}

async function saveProduct() {
  const data = {
    product_id: document.getElementById('f_product_id').value.trim(),
    product_name: document.getElementById('f_product_name').value.trim(),
    category: document.getElementById('f_category').value.trim(),
    unit: document.getElementById('f_unit').value.trim(),
    supplier_name: document.getElementById('f_supplier_name').value.trim(),
    current_price: Number(document.getElementById('f_current_price').value),
    memo: document.getElementById('f_memo').value.trim()
  };
  if (!data.product_id) { showToast('제품코드를 입력하세요.', 'warning'); return; }
  if (!data.product_name) { showToast('제품명을 입력하세요.', 'warning'); return; }
  if (isNaN(data.current_price) || data.current_price < 0) { showToast('단가를 올바르게 입력하세요.', 'warning'); return; }

  const action = editMode ? 'updateProduct' : 'addProduct';
  const res = await apiPost(action, data);
  if (res.success) {
    showToast(res.message, 'success');
    closeModal();
    loadProducts();
  } else {
    showToast(res.message, 'error');
  }
}

async function deleteProduct(id, name) {
  if (!confirm(`"${name}" 제품을 삭제하시겠습니까?\n단가 변경 이력이 있으면 삭제되지 않습니다.`)) return;
  const res = await apiPost('deleteProduct', { product_id: id });
  if (res.success) {
    showToast(res.message, 'success');
    loadProducts();
  } else {
    showToast(res.message, 'error');
  }
}

document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') loadProducts(); });
loadProducts();
</script>
</body>
</html>
