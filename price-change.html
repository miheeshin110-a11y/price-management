<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>단가 변경 등록 - 발주단가 관리 시스템</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
  <script>tailwind.config={theme:{extend:{colors:{navy:{900:'#0f2340',800:'#1e3a5f',700:'#2a4f7c',600:'#3b6494'}}}}}</script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex">

<div id="sidebarOverlay" class="hidden fixed inset-0 bg-black/40 z-20 mobile-only"></div>
<aside id="sidebar" class="fixed top-0 left-0 h-full w-60 bg-navy-800 text-white z-30 flex flex-col -translate-x-full md:translate-x-none">

    <div class="text-xs text-white/50 font-medium tracking-widest uppercase mb-1">DAYSON</div>
    <div class="text-base font-bold leading-tight">발주단가<br>관리 시스템</div>
  </div>
  <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
    <a href="index.html"        data-nav="index.html"       class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-white/70 hover:bg-white/10 transition-colors"><svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>대시보드</a>
    <a href="products.html"     data-nav="products.html"    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-white/70 hover:bg-white/10 transition-colors"><svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 3H8a2 2 0 00-2 2v2h12V5a2 2 0 00-2-2z"/></svg>제품 관리</a>
    <a href="price-change.html" data-nav="price-change.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-white/70 hover:bg-white/10 transition-colors"><svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12l7-7 7 7"/></svg>단가 변경 등록</a>
    <a href="history.html"      data-nav="history.html"     class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-white/70 hover:bg-white/10 transition-colors"><svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>전체 이력 조회</a>
    <a href="settings.html"     data-nav="settings.html"    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-white/70 hover:bg-white/10 transition-colors"><svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>사유코드 관리</a>
  </nav>
  <div class="px-6 py-4 border-t border-white/10 text-xs text-white/30">v1.0.0</div>
</aside>

<div class="flex-1 flex flex-col md:ml-60 min-h-screen">
  <header class="sticky top-0 z-10 bg-white border-b border-gray-200 flex items-center gap-3 px-5 py-3.5 shadow-sm">
    <button id="sidebarToggle" class="md:hidden p-1.5 rounded-lg hover:bg-gray-100 mobile-only">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <h1 class="text-base font-semibold text-gray-700">단가 변경 등록</h1>
  </header>

  <main class="flex-1 p-5 md:p-6 flex justify-center">
    <div class="w-full max-w-2xl">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="bg-navy-800 px-6 py-4">
          <p class="text-white/80 text-xs">제품의 단가 변경 사항을 등록합니다. 저장 시 해당 제품의 현재 단가가 자동으로 업데이트됩니다.</p>
        </div>

        <div class="p-6 space-y-5">
          <!-- 제품 선택 -->
          <div>
            <label class="text-xs font-semibold text-gray-600 block mb-2">제품 선택 <span class="text-red-500">*</span></label>
            <div class="relative">
              <input id="productSearch" type="text" placeholder="제품코드 또는 제품명으로 검색..." class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm" autocomplete="off" />
              <div id="productDropdown" class="hidden absolute top-full left-0 right-0 bg-white border border-gray-200 rounded-lg shadow-lg mt-1 max-h-52 overflow-y-auto z-10"></div>
            </div>
            <input type="hidden" id="selectedProductId" />
          </div>

          <!-- 현재 단가 표시 -->
          <div id="currentPriceArea" class="hidden bg-gray-50 rounded-xl p-4 border border-gray-100">
            <div class="grid grid-cols-3 gap-4 text-sm">
              <div><div class="text-xs text-gray-400 mb-1">제품명</div><div class="font-semibold" id="displayName">-</div></div>
              <div><div class="text-xs text-gray-400 mb-1">거래처</div><div id="displaySupplier">-</div></div>
              <div><div class="text-xs text-gray-400 mb-1">현재 단가</div><div class="font-bold text-navy-800 text-lg" id="displayCurrentPrice">-</div></div>
            </div>
          </div>

          <!-- 변경 후 단가 + 변동률 -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="text-xs font-semibold text-gray-600 block mb-2">변경 후 단가 <span class="text-red-500">*</span></label>
              <input id="newPrice" type="number" min="0" placeholder="0" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm" />
            </div>
            <div>
              <label class="text-xs font-semibold text-gray-600 block mb-2">변동률</label>
              <div id="rateDisplay" class="border border-gray-100 bg-gray-50 rounded-lg px-3 py-2.5 text-sm font-bold text-gray-400">
                제품 선택 후 입력
              </div>
            </div>
          </div>

          <!-- 적용일자 + 등록자 -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="text-xs font-semibold text-gray-600 block mb-2">적용일자 <span class="text-red-500">*</span></label>
              <input id="effectiveDate" type="date" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm" />
            </div>
            <div>
              <label class="text-xs font-semibold text-gray-600 block mb-2">등록자</label>
              <input id="registeredBy" type="text" placeholder="이름 입력" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm" />
            </div>
          </div>

          <!-- 변경 사유 -->
          <div>
            <label class="text-xs font-semibold text-gray-600 block mb-2">변경 사유 <span class="text-red-500">*</span></label>
            <select id="reasonCode" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm">
              <option value="">-- 사유 선택 --</option>
            </select>
          </div>

          <!-- 상세 내용 -->
          <div>
            <label class="text-xs font-semibold text-gray-600 block mb-2">상세 내용</label>
            <textarea id="reasonDetail" rows="3" placeholder="변경 사유에 대한 구체적인 내용을 입력하세요." class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm resize-none"></textarea>
          </div>

          <!-- 동일금액 경고 -->
          <div id="sameAmtWarn" class="hidden bg-amber-50 border border-amber-200 rounded-lg px-4 py-3 text-amber-700 text-sm">
            ⚠️ 현재 단가와 동일한 금액입니다. 변경 없이 등록하시겠습니까?
          </div>
        </div>

        <div class="px-6 pb-6 flex gap-3 justify-end border-t border-gray-50 pt-5">
          <button onclick="resetForm()" class="px-4 py-2 text-sm rounded-lg border border-gray-200 hover:bg-gray-50">초기화</button>
          <button onclick="submitForm()" class="px-6 py-2.5 text-sm bg-navy-800 text-white rounded-lg hover:bg-navy-700 font-semibold">단가 변경 저장</button>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="globalSpinner" class="hidden fixed inset-0 bg-black/30 z-50 flex items-center justify-center"><div class="spinner-ring"></div></div>
<div id="toastContainer" class="fixed top-5 right-5 space-y-2 z-50"></div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script>
let allProducts = [];
let selectedProduct = null;

const urlParams = new URLSearchParams(location.search);
const preselectedId = urlParams.get('id');

async function init() {
  document.getElementById('effectiveDate').value = todayStr();

  // 제품 목록 로드
  const pRes = await apiGet('getProducts');
  if (pRes.success) allProducts = pRes.data;

  // 사유코드 로드
  const rRes = await apiGet('getReasonCodes', { active_only: 'true' });
  if (rRes.success) {
    const sel = document.getElementById('reasonCode');
    // 카테고리별 그룹
    const groups = {};
    rRes.data.forEach(r => {
      if (!groups[r.reason_category]) groups[r.reason_category] = [];
      groups[r.reason_category].push(r);
    });
    Object.entries(groups).forEach(([cat, items]) => {
      const og = document.createElement('optgroup');
      og.label = cat;
      items.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.reason_code;
        opt.textContent = `[${r.reason_code}] ${r.reason_name}`;
        og.appendChild(opt);
      });
      sel.appendChild(og);
    });
  }

  // URL에서 제품 프리셀렉트
  if (preselectedId) {
    const p = allProducts.find(x => x.product_id === preselectedId);
    if (p) selectProduct(p);
  }

  setupProductSearch();
}

function setupProductSearch() {
  const input = document.getElementById('productSearch');
  const dropdown = document.getElementById('productDropdown');

  input.addEventListener('input', () => {
    const q = input.value.toLowerCase().trim();
    if (!q) { dropdown.classList.add('hidden'); return; }
    const filtered = allProducts.filter(p =>
      p.product_id.toLowerCase().includes(q) ||
      p.product_name.toLowerCase().includes(q)
    ).slice(0, 10);
    if (!filtered.length) { dropdown.classList.add('hidden'); return; }
    dropdown.innerHTML = filtered.map(p => `
      <div class="px-4 py-3 hover:bg-blue-50 cursor-pointer border-b border-gray-50 last:border-0"
           onclick="selectProduct(${JSON.stringify(p).replace(/"/g, '&quot;')})">
        <div class="text-sm font-medium">${p.product_name}</div>
        <div class="text-xs text-gray-400">${p.product_id} · ${p.supplier_name || '-'} · 현재 ${formatPrice(p.current_price)}</div>
      </div>`).join('');
    dropdown.classList.remove('hidden');
  });

  document.addEventListener('click', e => {
    if (!input.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.add('hidden');
  });
}

function selectProduct(p) {
  selectedProduct = p;
  document.getElementById('selectedProductId').value = p.product_id;
  document.getElementById('productSearch').value = `[${p.product_id}] ${p.product_name}`;
  document.getElementById('productDropdown').classList.add('hidden');

  document.getElementById('displayName').textContent = p.product_name;
  document.getElementById('displaySupplier').textContent = p.supplier_name || '-';
  document.getElementById('displayCurrentPrice').textContent = formatPrice(p.current_price);
  document.getElementById('currentPriceArea').classList.remove('hidden');

  calcRate();
}

function calcRate() {
  const rateEl = document.getElementById('rateDisplay');
  const warnEl = document.getElementById('sameAmtWarn');
  if (!selectedProduct) { rateEl.textContent = '제품 선택 후 입력'; rateEl.className = 'border border-gray-100 bg-gray-50 rounded-lg px-3 py-2.5 text-sm font-bold text-gray-400'; return; }
  const newPriceVal = Number(document.getElementById('newPrice').value);
  if (!newPriceVal && newPriceVal !== 0) { rateEl.textContent = '단가를 입력하세요'; rateEl.className = 'border border-gray-100 bg-gray-50 rounded-lg px-3 py-2.5 text-sm font-bold text-gray-400'; warnEl.classList.add('hidden'); return; }
  const cur = Number(selectedProduct.current_price);
  if (newPriceVal === cur) {
    rateEl.textContent = '0.00% (변동 없음)';
    rateEl.className = 'border border-gray-100 bg-gray-50 rounded-lg px-3 py-2.5 text-sm font-bold text-gray-500';
    warnEl.classList.remove('hidden');
    return;
  }
  warnEl.classList.add('hidden');
  const rate = cur > 0 ? ((newPriceVal - cur) / cur * 100) : 0;
  const isUp = rate > 0;
  rateEl.textContent = (isUp ? '▲ +' : '▼ ') + rate.toFixed(2) + '%';
  rateEl.className = `border rounded-lg px-3 py-2.5 text-sm font-bold ${isUp ? 'border-red-100 bg-red-50 text-red-600' : 'border-blue-100 bg-blue-50 text-blue-600'}`;
}

document.getElementById('newPrice').addEventListener('input', calcRate);

async function submitForm() {
  const productId = document.getElementById('selectedProductId').value;
  const newPrice  = Number(document.getElementById('newPrice').value);
  const reasonCode = document.getElementById('reasonCode').value;
  const effectiveDate = document.getElementById('effectiveDate').value;
  const reasonDetail  = document.getElementById('reasonDetail').value.trim();
  const registeredBy  = document.getElementById('registeredBy').value.trim();

  if (!productId)    { showToast('제품을 선택하세요.', 'warning'); return; }
  if (!newPrice && newPrice !== 0) { showToast('변경 후 단가를 입력하세요.', 'warning'); return; }
  if (!reasonCode)   { showToast('변경 사유를 선택하세요.', 'warning'); return; }
  if (!effectiveDate){ showToast('적용일자를 선택하세요.', 'warning'); return; }

  const res = await apiPost('addPriceChange', {
    product_id: productId,
    price_after: newPrice,
    reason_code: reasonCode,
    reason_detail: reasonDetail,
    effective_date: effectiveDate,
    registered_by: registeredBy
  });

  if (res.success) {
    showToast(`단가 변경이 등록되었습니다. (변동률: ${res.change_rate >= 0 ? '+' : ''}${res.change_rate}%)`, 'success');
    setTimeout(() => { location.href = `history-detail.html?id=${encodeURIComponent(productId)}`; }, 1500);
  } else {
    showToast(res.message, 'error');
  }
}

function resetForm() {
  selectedProduct = null;
  document.getElementById('selectedProductId').value = '';
  document.getElementById('productSearch').value = '';
  document.getElementById('currentPriceArea').classList.add('hidden');
  document.getElementById('newPrice').value = '';
  document.getElementById('reasonCode').value = '';
  document.getElementById('reasonDetail').value = '';
  document.getElementById('registeredBy').value = '';
  document.getElementById('effectiveDate').value = todayStr();
  document.getElementById('sameAmtWarn').classList.add('hidden');
  calcRate();
}

init();
</script>
</body>
</html>
