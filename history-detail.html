<!DOCTYPE html>
<html lang="ko">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex">

<div id="sidebarOverlay" class="hidden fixed inset-0 bg-black/40 z-20 mobile-only"></div>
<aside id="sidebar" class="fixed top-0 left-0 h-full w-60 bg-navy-800 text-white z-30 flex flex-col -translate-x-full md:translate-x-none">
  <div class="px-6 py-5 border-b border-white/10">
    <div class="text-xs text-white/50 font-medium tracking-widest uppercase mb-1">DAYSON</div>
    <div class="text-base font-bold leading-tight">발주단가<br>관리 시스템</div>
  </div>
  <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
    <a href="index.html"        data-nav="index.html"       class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-white/70 hover:bg-white/10 transition-colors"><svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>대시보드</a>
    <a href="products.html"     data-nav="products.html"    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-white/70 hover:bg-white/10 transition-colors"><svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 3H8a2 2 0 00-2 2v2h12V5a2 2 0 00-2-2z"/></svg>제품 관리</a>
    <a href="price-change.html" data-nav="price-change.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-white/70 hover:bg-white/10 transition-colors"><svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12l7-7 7 7"/></svg>단가 변경 등록</a>
    <a href="history.html"      data-nav="history.html"     class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-white/70 hover:bg-white/10 transition-colors"><svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>전체 이력 조회</a>
    <a href="settings.html"     data-nav="settings.html"    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-white/70 hover:bg-white/10 transition-colors"><svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>사유코드 관리</a>
  </nav>
  <div class="px-6 py-4 border-t border-white/10 text-xs text-white/30">v1.0.0</div>
</aside>

<div class="flex-1 flex flex-col md:ml-60 min-h-screen">
  <header class="sticky top-0 z-10 bg-white border-b border-gray-200 flex items-center gap-3 px-5 py-3.5 shadow-sm">
    <button id="sidebarToggle" class="md:hidden p-1.5 rounded-lg hover:bg-gray-100 mobile-only">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <a href="products.html" class="text-gray-400 hover:text-gray-600 text-sm">← 제품 목록</a>
    <span class="text-gray-300">|</span>
    <h1 class="text-base font-semibold text-gray-700" id="pageTitle">단가 히스토리</h1>
  </header>

  <main class="flex-1 p-5 md:p-6 space-y-5">
    <!-- 제품 정보 카드 -->
    <div id="productCard" class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 grid grid-cols-2 md:grid-cols-4 gap-4">
      <div><div class="text-xs text-gray-400 mb-1">제품코드</div><div class="font-mono font-semibold text-sm" id="pId">-</div></div>
      <div><div class="text-xs text-gray-400 mb-1">제품명</div><div class="font-semibold" id="pName">-</div></div>
      <div><div class="text-xs text-gray-400 mb-1">거래처</div><div class="text-sm" id="pSupplier">-</div></div>
      <div><div class="text-xs text-gray-400 mb-1">현재 단가</div><div class="font-bold text-navy-800 text-lg" id="pPrice">-</div></div>
      <div><div class="text-xs text-gray-400 mb-1">카테고리</div><div class="text-sm" id="pCategory">-</div></div>
      <div><div class="text-xs text-gray-400 mb-1">단위</div><div class="text-sm" id="pUnit">-</div></div>
      <div class="col-span-2"><div class="text-xs text-gray-400 mb-1">메모</div><div class="text-sm text-gray-600" id="pMemo">-</div></div>
    </div>

    <!-- 기간 필터 -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 flex flex-wrap gap-3 items-center">
      <label class="text-xs font-semibold text-gray-600">기간</label>
      <input id="dateFrom" type="date" class="border border-gray-200 rounded-lg px-3 py-2 text-sm" />
      <span class="text-gray-400 text-sm">~</span>
      <input id="dateTo"   type="date" class="border border-gray-200 rounded-lg px-3 py-2 text-sm" />
      <button onclick="loadHistory()" class="bg-navy-800 text-white text-sm px-4 py-2 rounded-lg hover:bg-navy-700">조회</button>
      <button onclick="clearFilter()" class="text-sm px-4 py-2 rounded-lg border border-gray-200 hover:bg-gray-50 text-gray-600">초기화</button>
      <a id="btnAddPrice" href="#" class="ml-auto flex items-center gap-2 bg-emerald-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-emerald-500 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        단가 변경 등록
      </a>
    </div>

    <!-- 라인차트 -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
      <h2 class="text-sm font-semibold text-gray-700 mb-4">단가 추이</h2>
      <div class="relative h-64">
        <canvas id="priceChart"></canvas>
        <div id="chartEmpty" class="hidden absolute inset-0 flex items-center justify-center text-gray-400 text-sm">이력 데이터가 없습니다.</div>
      </div>
    </div>

    <!-- 이력 테이블 -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="px-5 py-4 border-b border-gray-100">
        <h2 class="text-sm font-semibold text-gray-700">변경 이력</h2>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 text-xs text-gray-500 uppercase tracking-wide">
              <th class="px-4 py-3 text-center font-medium">적용일</th>
              <th class="px-4 py-3 text-right font-medium">변경 전</th>
              <th class="px-4 py-3 text-right font-medium">변경 후</th>
              <th class="px-4 py-3 text-center font-medium">변동률</th>
              <th class="px-4 py-3 text-left font-medium">사유코드</th>
              <th class="px-4 py-3 text-left font-medium desktop-only">상세 내용</th>
              <th class="px-4 py-3 text-center font-medium desktop-only">등록자</th>
            </tr>
          </thead>
          <tbody id="historyTable">
            <tr><td colspan="7" class="px-4 py-10 text-center text-gray-400 text-sm">로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div id="globalSpinner" class="hidden fixed inset-0 bg-black/30 z-50 flex items-center justify-center"><div class="spinner-ring"></div></div>
<div id="toastContainer" class="fixed top-5 right-5 space-y-2 z-50"></div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script>
const params = new URLSearchParams(location.search);
const productId = params.get('id');
let chartInstance = null;

if (!productId) {
  alert('제품 ID가 없습니다.');
  location.href = 'products.html';
}

document.getElementById('btnAddPrice').href = `price-change.html?id=${encodeURIComponent(productId)}`;

async function init() {
  const pRes = await apiGet('getProduct', { product_id: productId });
  if (!pRes.success) { showToast('제품 정보를 불러올 수 없습니다.', 'error'); return; }
  const p = pRes.data;
  document.getElementById('pageTitle').textContent = p.product_name + ' — 단가 히스토리';
  document.getElementById('pId').textContent = p.product_id;
  document.getElementById('pName').textContent = p.product_name;
  document.getElementById('pSupplier').textContent = p.supplier_name || '-';
  document.getElementById('pPrice').textContent = formatPrice(p.current_price);
  document.getElementById('pCategory').textContent = p.category || '-';
  document.getElementById('pUnit').textContent = p.unit || '-';
  document.getElementById('pMemo').textContent = p.memo || '-';

  await loadHistory();
}

function clearFilter() {
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value = '';
  loadHistory();
}

async function loadHistory() {
  const dateFrom = document.getElementById('dateFrom').value;
  const dateTo   = document.getElementById('dateTo').value;
  const res = await apiGet('getPriceHistory', { product_id: productId, date_from: dateFrom, date_to: dateTo });
  if (!res.success) { showToast(res.message, 'error'); return; }
  const data = res.data;

  renderTable(data);
  renderChart(data);
}

function renderTable(data) {
  const tbody = document.getElementById('historyTable');
  if (!data.length) { tbody.innerHTML = emptyRow(7); return; }
  tbody.innerHTML = [...data].sort((a,b) => b.effective_date.localeCompare(a.effective_date)).map(r => `
    <tr class="border-t border-gray-50">
      <td class="px-4 py-3 text-center text-gray-600 text-xs">${r.effective_date}</td>
      <td class="px-4 py-3 text-right text-gray-400">${formatPrice(r.price_before)}</td>
      <td class="px-4 py-3 text-right font-semibold">${formatPrice(r.price_after)}</td>
      <td class="px-4 py-3 text-center">${rateHtml(r.change_rate)}</td>
      <td class="px-4 py-3"><span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded">${r.reason_code || '-'}</span></td>
      <td class="px-4 py-3 text-xs text-gray-500 max-w-xs truncate desktop-only">${r.reason_detail || '-'}</td>
      <td class="px-4 py-3 text-center text-xs text-gray-400 desktop-only">${r.registered_by || '-'}</td>
    </tr>`).join('');
}

function renderChart(data) {
  const canvas = document.getElementById('priceChart');
  const emptyEl = document.getElementById('chartEmpty');

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

  if (!data.length) {
    emptyEl.classList.remove('hidden');
    canvas.classList.add('hidden');
    return;
  }
  emptyEl.classList.add('hidden');
  canvas.classList.remove('hidden');

  const sorted = [...data].sort((a,b) => a.effective_date.localeCompare(b.effective_date));
  const labels = sorted.map(r => r.effective_date);
  const prices = sorted.map(r => r.price_after);

  chartInstance = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: '단가',
        data: prices,
        borderColor: '#1e3a5f',
        backgroundColor: 'rgba(30,58,95,0.07)',
        borderWidth: 2.5,
        pointRadius: 5,
        pointBackgroundColor: '#1e3a5f',
        tension: 0.3,
        fill: true
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => '₩' + ctx.parsed.y.toLocaleString('ko-KR') }
      }},
      scales: {
        y: { ticks: { callback: v => '₩' + v.toLocaleString('ko-KR') }, grid: { color: '#f3f4f6' } },
        x: { grid: { display: false } }
      }
    }
  });
}

init();
</script>
</body>
</html>
