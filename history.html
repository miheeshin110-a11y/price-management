  <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">

    <a href="products.html"     data-nav="products.html"    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-white/70 hover:bg-white/10 transition-colors"><svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 3H8a2 2 0 00-2 2v2h12V5a2 2 0 00-2-2z"/></svg>제품 관리</a>
    <a href="price-history-tab.html" data-nav="price-history-tab.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-white/70 hover:bg-white/10 transition-colors"><svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M7 12l5-5 5 5M7 17l5-5 5 5"/></svg>단가 히스토리</a>
    <a href="price-change.html" data-nav="price-change.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-white/70 hover:bg-white/10 transition-colors"><svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12l7-7 7 7"/></svg>단가 변경 등록</a>
    <a href="history.html"      data-nav="history.html"     class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-white/70 hover:bg-white/10 transition-colors"><svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>전체 이력 조회</a>
    <a href="settings.html"     data-nav="settings.html"    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-white/70 hover:bg-white/10 transition-colors"><svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>사유코드 관리</a>
  </nav>
  <div class="px-6 py-4 border-t border-white/10 text-xs text-white/30">v1.0.0</div>
</aside>

<div class="flex-1 flex flex-col md:ml-60 min-h-screen">
  <header class="sticky top-0 z-10 bg-white border-b border-gray-200 flex items-center justify-between px-5 py-3.5 shadow-sm">
    <div class="flex items-center gap-3">
      <button id="sidebarToggle" class="md:hidden p-1.5 rounded-lg hover:bg-gray-100 mobile-only">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <h1 class="text-base font-semibold text-gray-700">전체 이력 조회</h1>
    </div>
    <button onclick="downloadCsv()" class="flex items-center gap-2 border border-gray-200 text-gray-600 text-sm px-4 py-2 rounded-lg hover:bg-gray-50 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      CSV 다운로드
    </button>
  </header>

  <main class="flex-1 p-5 md:p-6 space-y-5">
    <!-- 필터 -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
        <div>
          <label class="text-xs font-semibold text-gray-500 block mb-1">기간 시작</label>
          <input id="fDateFrom" type="date" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" />
        </div>
        <div>
          <label class="text-xs font-semibold text-gray-500 block mb-1">기간 종료</label>
          <input id="fDateTo" type="date" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" />
        </div>
        <div>
          <label class="text-xs font-semibold text-gray-500 block mb-1">제품</label>
          <select id="fProduct" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
            <option value="">전체 제품</option>
          </select>
        </div>
        <div>
          <label class="text-xs font-semibold text-gray-500 block mb-1">거래처</label>
          <select id="fSupplier" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
            <option value="">전체 거래처</option>
          </select>
        </div>
      </div>
      <div class="flex gap-3 items-end">
        <div class="flex-1">
          <label class="text-xs font-semibold text-gray-500 block mb-1">사유코드</label>
          <select id="fReason" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">
            <option value="">전체 사유</option>
          </select>
        </div>
        <button onclick="search()" class="bg-navy-800 text-white text-sm px-5 py-2 rounded-lg hover:bg-navy-700">조회</button>
        <button onclick="resetFilter()" class="text-sm px-4 py-2 rounded-lg border border-gray-200 hover:bg-gray-50 text-gray-600">초기화</button>
      </div>
    </div>

    <!-- 결과 요약 -->
    <div class="flex items-center justify-between">
      <div class="text-sm text-gray-500">총 <span id="totalCount" class="font-bold text-gray-800">0</span>건</div>
    </div>

    <!-- 테이블 -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 text-xs text-gray-500 uppercase tracking-wide">
              <th class="px-4 py-3 text-center font-medium">적용일</th>
              <th class="px-4 py-3 text-left font-medium">제품명</th>
              <th class="px-4 py-3 text-left font-medium desktop-only">카테고리</th>
              <th class="px-4 py-3 text-left font-medium desktop-only">거래처</th>
              <th class="px-4 py-3 text-right font-medium">변경 전</th>
              <th class="px-4 py-3 text-right font-medium">변경 후</th>
              <th class="px-4 py-3 text-center font-medium">변동률</th>
              <th class="px-4 py-3 text-left font-medium desktop-only">사유</th>
              <th class="px-4 py-3 text-center font-medium desktop-only">등록자</th>
            </tr>
          </thead>
          <tbody id="historyTable">
            <tr><td colspan="9" class="px-4 py-10 text-center text-gray-400 text-sm">로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 페이지네이션 -->
    <div id="pagination" class="flex items-center justify-center gap-1"></div>
  </main>
</div>

<div id="globalSpinner" class="hidden fixed inset-0 bg-black/30 z-50 flex items-center justify-center"><div class="spinner-ring"></div></div>
<div id="toastContainer" class="fixed top-5 right-5 space-y-2 z-50"></div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script>
const PAGE_SIZE = 20;
let allData = [];
let currentPage = 1;

async function init() {
  // 필터 셀렉트 채우기
  const pRes = await apiGet('getProducts');
  if (pRes.success) {
    const pSel = document.getElementById('fProduct');
    const sSel = document.getElementById('fSupplier');
    const suppliers = [...new Set(pRes.data.map(p => p.supplier_name).filter(Boolean))];
    pRes.data.forEach(p => {
      const o = document.createElement('option');
      o.value = p.product_id;
      o.textContent = `[${p.product_id}] ${p.product_name}`;
      pSel.appendChild(o);
    });
    suppliers.forEach(s => {
      const o = document.createElement('option');
      o.value = s; o.textContent = s;
      sSel.appendChild(o);
    });
  }
  const rRes = await apiGet('getReasonCodes');
  if (rRes.success) {
    const rSel = document.getElementById('fReason');
    rRes.data.forEach(r => {
      const o = document.createElement('option');
      o.value = r.reason_code;
      o.textContent = `[${r.reason_code}] ${r.reason_name}`;
      rSel.appendChild(o);
    });
  }
  await search();
}

async function search() {
  currentPage = 1;
  const params = {
    product_id:    document.getElementById('fProduct').value,
    supplier_name: document.getElementById('fSupplier').value,
    reason_code:   document.getElementById('fReason').value,
    date_from:     document.getElementById('fDateFrom').value,
    date_to:       document.getElementById('fDateTo').value
  };
  const res = await apiGet('getPriceHistory', params);
  if (!res.success) { showToast(res.message, 'error'); return; }
  allData = res.data;
  document.getElementById('totalCount').textContent = allData.length;
  renderPage();
}

function resetFilter() {
  ['fDateFrom','fDateTo'].forEach(id => document.getElementById(id).value = '');
  ['fProduct','fSupplier','fReason'].forEach(id => document.getElementById(id).value = '');
  search();
}

function renderPage() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageData = allData.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('historyTable');
  if (!pageData.length) { tbody.innerHTML = emptyRow(9); renderPagination(); return; }
  tbody.innerHTML = pageData.map(r => `
    <tr class="border-t border-gray-50 hover:bg-gray-50 cursor-pointer" onclick="location.href='history-detail.html?id=${encodeURIComponent(r.product_id)}'">
      <td class="px-4 py-3 text-center text-xs text-gray-500">${r.effective_date}</td>
      <td class="px-4 py-3"><div class="font-medium">${r.product_name || r.product_id}</div><div class="text-xs text-gray-400 font-mono">${r.product_id}</div></td>
      <td class="px-4 py-3 text-gray-500 text-xs desktop-only">${r.category || '-'}</td>
      <td class="px-4 py-3 text-gray-500 text-xs desktop-only">${r.supplier_name || '-'}</td>
      <td class="px-4 py-3 text-right text-gray-400">${formatPrice(r.price_before)}</td>
      <td class="px-4 py-3 text-right font-semibold">${formatPrice(r.price_after)}</td>
      <td class="px-4 py-3 text-center">${rateHtml(r.change_rate)}</td>
      <td class="px-4 py-3 desktop-only"><span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded">${r.reason_code || '-'}</span></td>
      <td class="px-4 py-3 text-center text-xs text-gray-400 desktop-only">${r.registered_by || '-'}</td>
    </tr>`).join('');
  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(allData.length / PAGE_SIZE);
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }
  let html = '';
  const start = Math.max(1, currentPage - 2);
  const end   = Math.min(total, currentPage + 2);
  if (currentPage > 1) html += `<button class="page-btn" onclick="goPage(${currentPage-1})">‹</button>`;
  if (start > 1) html += `<button class="page-btn" onclick="goPage(1)">1</button>${start > 2 ? '<span class="px-1 text-gray-400">…</span>' : ''}`;
  for (let i = start; i <= end; i++) {
    html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  if (end < total) html += `${end < total-1 ? '<span class="px-1 text-gray-400">…</span>' : ''}<button class="page-btn" onclick="goPage(${total})">${total}</button>`;
  if (currentPage < total) html += `<button class="page-btn" onclick="goPage(${currentPage+1})">›</button>`;
  pg.innerHTML = html;
}

function goPage(n) { currentPage = n; renderPage(); window.scrollTo(0, 0); }

function downloadCsv() {
  if (!allData.length) { showToast('다운로드할 데이터가 없습니다.', 'warning'); return; }
  const headers = ['적용일','제품코드','제품명','카테고리','거래처','변경전단가','변경후단가','변동률(%)','사유코드','상세내용','등록자','등록일시'];
  const rows = allData.map(r => [
    r.effective_date, r.product_id, r.product_name, r.category, r.supplier_name,
    r.price_before, r.price_after, r.change_rate, r.reason_code, `"${(r.reason_detail||'').replace(/"/g,'""')}"`,
    r.registered_by, r.created_at
  ]);
  const csv = '\uFEFF' + [headers, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  const now = new Date();
  const yyyymmdd = now.toISOString().slice(0,10).replace(/-/g,'');
  a.href = URL.createObjectURL(blob);
  a.download = `단가변경이력_${yyyymmdd}.csv`;
  a.click();
}

init();
</script>
</body>
</html>
